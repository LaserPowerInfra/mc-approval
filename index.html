<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MC APPROVAL SYSTEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f0f2f5; }
        header { background: #0d6efd; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; }
        .card { max-width: 650px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        label { font-size: 13px; font-weight: bold; color: #444; margin-bottom: 5px; display: block; }
        .req::after { content: " *"; color: red; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; }
        input:focus, select:focus { border-color: #0d6efd; box-shadow: 0 0 5px rgba(13,110,253,0.2); }
        input[readonly] { background: #f8f9fa; color: #555; border-color: #ddd; }
        .btn-submit { background: #0d6efd; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: background 0.3s; }
        .btn-submit:hover { background: #0b5ed7; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        #loginSection { text-align: center; padding: 50px 20px; }
        .btn-google { background: white; border: 1px solid #ddd; padding: 12px 24px; cursor: pointer; border-radius: 50px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 0 auto; }
        .user-badge { background: #e7f1ff; color: #0d6efd; padding: 8px; border-radius: 6px; text-align: center; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<header>MC APPROVAL PORTAL</header>

<div class="card">
    <div id="loginSection">
        <h3 style="margin-bottom: 20px;">System Authentication</h3>
        <button onclick="googleLogin()" class="btn-google">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" alt="Google"> 
            Sign in with Google
        </button>
    </div>

    <div id="formSection" style="display:none;">
        <div id="userInfo" class="user-badge"></div>
        <form class="form-grid" id="entryForm">
            <input type="hidden" id="userEmail" name="userEmail">

            <div>
                <label class="req">MC NO</label>
                <select id="mcNo" name="mcNo" onchange="updateItems()" required>
                    <option value="">Loading MC List...</option>
                </select>
            </div>

            <div>
                <label class="req">ITEM NAME</label>
                <select id="itemName" name="itemName" onchange="updateItemCode()" required>
                    <option value="">Select MC First</option>
                </select>
            </div>

            <div>
                <label class="req">ITEM CODE</label>
                <input id="itemCode" name="itemCode" readonly placeholder="Auto-filled from selection" required>
            </div>

            <div><label class="req">DRAWING ATTACHMENT (Link)</label><input name="drawingAttach" placeholder="Paste Google Drive/URL" required></div>
            <div><label class="req">GTP ATTACHMENT (Link)</label><input name="gtpAttach" placeholder="Paste Google Drive/URL" required></div>
            <div><label class="req">EMBOSSING ATTACHMENT (Link)</label><input name="embossingAttach" placeholder="Paste Google Drive/URL" required></div>
            <div><label class="req">TARGET DELIVERY DATE</label><input type="date" name="targetDeliveryDate" required></div>

            <button type="button" class="btn-submit" id="submitBtn" onclick="handleFormSubmit()">Submit Data</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDywbG-rcyBHFB6OhuJesqasadBYDRlrJk",
        authDomain: "laser-html-apps.firebaseapp.com",
        projectId: "laser-html-apps",
        appId: "1:919012116249:web:3699a77a34c8c8facd6788"
    };

    // Tomar dewa notun URL ekhane add kora hoyeche
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4Ig4ucfnY0IZy5oSsg-AYkTifuKL8ptJHPHjOsPzfNdYFfmAp-2Y4w4THyNZopajL-g/exec";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentMcItems = [];

    window.googleLogin = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("formSection").style.display = "block";
            document.getElementById("userEmail").value = user.email;
            document.getElementById("userInfo").innerText = "👤 Signed in as: " + user.displayName;
            loadMcList();
        }
    });

    async function loadMcList() {
        try {
            const r = await fetch(SCRIPT_URL + "?action=getMcList");
            const res = await r.json();
            const mcDrop = document.getElementById("mcNo");
            mcDrop.innerHTML = '<option value="">-- Select MC NO --</option>';
            res.data.forEach(mc => {
                mcDrop.innerHTML += `<option value="${mc}">${mc}</option>`;
            });
        } catch (e) {
            Swal.fire("Error", "Could not load MC List", "error");
        }
    }

    window.updateItems = async function() {
        const mc = document.getElementById("mcNo").value;
        const itemDrop = document.getElementById("itemName");
        if (!mc) return;

        itemDrop.innerHTML = '<option>Loading Items...</option>';
        const r = await fetch(SCRIPT_URL + `?action=getItemDetails&mcNo=${encodeURIComponent(mc)}`);
        const res = await r.json();
        currentMcItems = res.data;
        
        itemDrop.innerHTML = '<option value="">-- Select Item --</option>';
        res.data.forEach(item => {
            itemDrop.innerHTML += `<option value="${item.itemName}">${item.itemName}</option>`;
        });
    };

    window.updateItemCode = function() {
        const name = document.getElementById("itemName").value;
        const found = currentMcItems.find(i => i.itemName === name);
        document.getElementById("itemCode").value = found ? found.itemCode : "";
    };

    window.handleFormSubmit = async function() {
        const form = document.getElementById("entryForm");
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerText = "Processing...";

        const formData = new FormData(form);
        const obj = Object.fromEntries(formData.entries());

        try {
            const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(obj) });
            const res = await r.json();
            if (res.result === "success") {
                Swal.fire({ icon: 'success', title: 'Success', text: 'Data saved to Spreadsheet!' });
                form.reset();
                document.getElementById("itemCode").value = "";
                // User Email ta reset hoye jay, tai ota abar set kora dorkar
                document.getElementById("userEmail").value = auth.currentUser.email;
            } else {
                throw new Error(res.message);
            }
        } catch (e) {
            Swal.fire("Error", "Submission failed: " + e.message, "error");
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit Data";
        }
    };
</script>
</body>
</html>
